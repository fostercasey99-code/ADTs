<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADT Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e11; --bg2: #13151a; --bg3: #1c1f27;
  --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.14);
  --text: #e8e6df; --text2: #888785; --text3: #454340;
  --blue: #4f8ef7; --teal: #3ec9a0; --amber: #f0a030;
  --coral: #f06050; --purple: #9f7ef7; --green: #5ec460;
  --pink: #f07ab0; --yellow: #e8d050;
  --font-head: 'Syne', sans-serif;
  --font-body: 'Lora', serif;
  --font-mono: 'DM Mono', monospace;
  --r: 12px; --r-sm: 7px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

/* ── HEADER ── */
.hdr { padding: 28px 40px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
.hdr-inner { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; align-items: baseline; gap: 16px; }
.hdr h1 { font-family: var(--font-head); font-size: 22px; font-weight: 800; letter-spacing: -.01em; }
.hdr p { font-size: 13px; color: var(--text2); font-style: italic; }

/* ── LAYOUT ── */
.layout { display: flex; min-height: calc(100vh - 69px); max-width: 1400px; margin: 0 auto; width: 100%; }
.sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 0; height: calc(100vh - 69px); overflow-y: auto; }
.sidebar-lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; padding: 0 24px 10px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; cursor: pointer; font-size: 14px; color: var(--text2); border-left: 2px solid transparent; transition: all .15s; user-select: none; font-family: var(--font-head); font-weight: 500; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--text); border-left-color: var(--accent, #4f8ef7); background: rgba(255,255,255,0.04); }
.nav-icon { font-size: 18px; width: 26px; text-align: center; }
.main { flex: 1; padding: 36px 44px; min-width: 0; }
.panel { display: none; } .panel.active { display: block; }

/* ── PANEL HEADER ── */
.ph { margin-bottom: 24px; }
.ph-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
.ph-title { font-family: var(--font-head); font-size: 30px; font-weight: 800; }
.ph-badge { font-family: var(--font-mono); font-size: 10px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border-hi); color: var(--text2); }
.ph-desc { font-size: 14px; color: var(--text2); line-height: 1.75; max-width: 580px; }
.ph-under { font-family: var(--font-mono); font-size: 11px; color: var(--text3); margin-top: 6px; }
.ph-under span { color: var(--text2); }

/* ── CONTROLS ── */
.ctrls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.ci { width: 64px; font-size: 13px; font-family: var(--font-mono); padding: 6px 9px; border: 1px solid var(--border-hi); border-radius: var(--r-sm); background: var(--bg3); color: var(--text); outline: none; }
.ci:focus { border-color: var(--blue); }
.clbl { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
.cb { font-size: 12px; font-family: var(--font-head); font-weight: 600; padding: 6px 15px; border: 1px solid var(--border-hi); border-radius: var(--r-sm); background: var(--bg3); color: var(--text); cursor: pointer; transition: all .15s; }
.cb:hover { background: rgba(255,255,255,0.07); }
.cb.p { background: rgba(79,142,247,0.14); border-color: rgba(79,142,247,0.35); color: #a8c8ff; }
.cb.p:hover { background: rgba(79,142,247,0.24); }
.cb:active { transform: scale(.97); }
.csep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }

/* ── SCENE ── */
.scene { border: 1px solid var(--border); border-radius: var(--r); background: var(--bg2); overflow-x: auto; overflow-y: hidden; margin-bottom: 12px; cursor: grab; }
#pq-scene { overflow-y: auto; overflow-x: auto; max-height: 360px; }
#stack-scene { overflow-y: auto; overflow-x: hidden; max-height: 380px; }
#pq-scene::-webkit-scrollbar { width: 5px; height: 5px; }
#pq-scene::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
.scene canvas { min-width: 100%; display: block; }
.scene::-webkit-scrollbar { height: 5px; }
.scene::-webkit-scrollbar-track { background: var(--bg3); border-radius: 3px; }
.scene::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
canvas { display: block; width: 100%; }
.log { font-family: var(--font-mono); font-size: 12px; color: var(--text3); padding: 7px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); min-height: 22px; transition: color .2s; }
.log.hi { color: var(--amber); }
.callout { font-size: 13px; color: var(--text2); background: rgba(79,142,247,0.05); border: 1px solid rgba(79,142,247,0.14); border-left: 3px solid var(--blue); border-radius: var(--r-sm); padding: 10px 14px; margin-top: 14px; line-height: 1.65; }
.callout strong { color: var(--text); font-weight: 600; }
.methods-panel { margin-top: 14px; border: 1px solid var(--border-hi); border-radius: var(--r-sm); overflow: hidden; }
.methods-header { padding: 8px 14px; background: rgba(255,255,255,.04); border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; }
.methods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.method-row { display: flex; flex-direction: column; padding: 10px 14px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.method-row:nth-child(even) { border-right: none; }
.method-row:nth-last-child(1), .method-row:nth-last-child(2) { border-bottom: none; }
.method-sig { font-family: var(--font-mono); font-size: 12px; color: #7de8c8; margin-bottom: 4px; }
.method-sig .mn { color: #7de8c8; }
.method-sig .mp { color: #a8c8ff; }
.method-sig .mr { color: #c4adff; font-style: italic; }
.method-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.method-badge { font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-top: 4px; }
.method-badge.o1 { color: #3ec9a0; }
.method-badge.on { color: #f0a030; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
</style>
</head>
<body>
<header class="hdr">
  <h1>Abstract Data Types</h1>

</header>
<div class="layout">
  <nav class="sidebar"><div class="sidebar-lbl">ADTs</div><div id="nav"></div></nav>
  <main class="main" id="panels"></main>
</div>

<script>
const DPR = window.devicePixelRatio||1;
function mkCanvas(id, h, minW=0){
  const c=document.getElementById(id); if(!c)return null;
  const W=Math.max(c.parentElement.clientWidth, minW);
  c.width=Math.round(W*DPR); c.height=Math.round(h*DPR);
  c.style.width=W+'px'; c.style.height=h+'px';
  const ctx=c.getContext('2d');
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.translate(.5,.5);
  return{c,ctx,W,H:h};
}
function rr(ctx,x,y,w,h,r=8){
  x=Math.round(x);y=Math.round(y);w=Math.round(w);h=Math.round(h);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function box(ctx,x,y,w,h,fill,stroke,text,textColor='#e8e6df',r=8,lw=.8){
  ctx.save();rr(ctx,x,y,w,h,r);ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.fill();ctx.stroke();
  if(text!==null&&text!==undefined){
    ctx.fillStyle=textColor;ctx.font='500 12px "DM Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(text),Math.round(x+w/2),Math.round(y+h/2));
  }
  ctx.restore();
}
function txt(ctx,x,y,t,size=11,color='#454340',align='center',style=''){
  ctx.save();ctx.font=`${style}${size}px "DM Mono",monospace`;ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='middle';
  ctx.fillText(String(t),Math.round(x),Math.round(y));ctx.restore();
}
function arw(ctx,x1,y1,x2,y2,color,sz=7){
  ctx.save();ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=1;
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();ctx.moveTo(Math.round(x1),Math.round(y1));ctx.lineTo(Math.round(x2),Math.round(y2));ctx.stroke();
  ctx.beginPath();ctx.moveTo(Math.round(x2),Math.round(y2));
  ctx.lineTo(Math.round(x2-sz*Math.cos(a-.4)),Math.round(y2-sz*Math.sin(a-.4)));
  ctx.lineTo(Math.round(x2-sz*Math.cos(a+.4)),Math.round(y2-sz*Math.sin(a+.4)));
  ctx.closePath();ctx.fill();ctx.restore();
}
function setLog(id,t,hi=false){const e=document.getElementById(id);if(!e)return;e.textContent=t;e.classList.toggle('hi',hi);}
function lerp(a,b,t){return a+(b-a)*t;}
function easeOut(t){return 1-Math.pow(1-t,3);}

/* ════════════════════════════════
   LIST
════════════════════════════════ */
let listData=[3,7,1,9,4];let listAnim=null;
function listGetX(count,i,W){const bw=54,gap=8,total=count*(bw+gap)-gap;return(W-total)/2+i*(bw+gap);}
function listDraw(data,hiIdxs=[]){
  const minW=Math.max(500, data.length*(54+8)-8+80);
  const s=mkCanvas('list-c',150,minW);if(!s)return;
  const{ctx,W,H}=s;ctx.clearRect(-1,-1,W+2,H+2);
  const bw=54,bh=48,sy=42;
  txt(ctx,W/2,18,'ordered — each item has an index',11,'#454340');
  data.forEach((v,i)=>{
    const x=listGetX(data.length,i,W),hi=hiIdxs.includes(i);
    box(ctx,x,sy,bw,bh,hi?'rgba(240,160,48,.22)':'rgba(79,142,247,.13)',hi?'rgba(240,160,48,.7)':'rgba(79,142,247,.5)',v,hi?'#ffc860':'#a8c8ff');
    txt(ctx,x+bw/2,sy+bh+15,String(i),10,hi?'#ffc860':'#454340');
  });
  txt(ctx,W/2,H-8,'index',10,'#2a2a28');
}
function listInsert(){
  if(listAnim)cancelAnimationFrame(listAnim);
  const val=parseInt(document.getElementById('list-val').value)||0;
  const idx=Math.max(0,Math.min(parseInt(document.getElementById('list-idx').value)||0,listData.length));
  const liMinW=Math.max(500,(listData.length+1)*(54+8)-8+80);
  const s=mkCanvas('list-c',150,liMinW);if(!s)return;
  const{ctx,W,H}=s;const bw=54,bh=48,sy=42;
  const newCount=listData.length+1;
  let start=null;const dur=600;
  setLog('list-log',`Inserting ${val} at index ${idx} — shifting ${listData.length-idx} item(s)…`,true);
  function frame(now){
    if(!start)start=now;
    const t=easeOut(Math.min((now-start)/dur,1));
    ctx.clearRect(-1,-1,W+2,H+2);
    txt(ctx,W/2,18,'ordered — each item has an index',11,'#454340');
    listData.forEach((v,i)=>{
      const srcX=listGetX(listData.length,i,W);
      const dstX=listGetX(newCount,i>=idx?i+1:i,W);
      const x=lerp(srcX,dstX,t);
      box(ctx,x,sy,bw,bh,'rgba(79,142,247,.13)','rgba(79,142,247,.5)',v,'#a8c8ff');
      txt(ctx,x+bw/2,sy+bh+15,String(i>=idx?i+1:i),10,'#454340');
    });
    const ghostX=lerp(listGetX(newCount,idx,W)-60,listGetX(newCount,idx,W),t);
    ctx.save();ctx.globalAlpha=t;
    box(ctx,ghostX,sy,bw,bh,'rgba(62,201,160,.22)','rgba(62,201,160,.7)',val,'#7de8c8');
    ctx.restore();
    if(t<1)listAnim=requestAnimationFrame(frame);
    else{listData=[...listData.slice(0,idx),val,...listData.slice(idx)];listDraw(listData,[idx]);setLog('list-log',`Inserted ${val} at [${idx}]. List length: ${listData.length}.`);}
  }
  listAnim=requestAnimationFrame(frame);
}
function listRemove(){
  if(listAnim)cancelAnimationFrame(listAnim);
  const idx=Math.max(0,Math.min(parseInt(document.getElementById('list-idx').value)||0,listData.length-1));
  const removed=listData[idx];
  const lrMinW=Math.max(500,listData.length*(54+8)-8+80);
  const s=mkCanvas('list-c',150,lrMinW);if(!s)return;
  const{ctx,W,H}=s;const bw=54,bh=48,sy=42;
  const newData=listData.filter((_,i)=>i!==idx);
  let start=null;const dur=600;
  setLog('list-log',`Removing index ${idx} (${removed})…`,true);
  function frame(now){
    if(!start)start=now;
    const t=easeOut(Math.min((now-start)/dur,1));
    ctx.clearRect(-1,-1,W+2,H+2);
    txt(ctx,W/2,18,'ordered — each item has an index',11,'#454340');
    listData.forEach((v,i)=>{
      if(i===idx){ctx.save();ctx.globalAlpha=1-t;box(ctx,listGetX(listData.length,i,W),sy,bw,bh,'rgba(240,96,80,.2)','rgba(240,96,80,.6)',v,'#ff9a90');ctx.restore();return;}
      const srcX=listGetX(listData.length,i,W);
      const dstX=listGetX(newData.length,i>idx?i-1:i,W);
      const x=lerp(srcX,dstX,t);
      box(ctx,x,sy,bw,bh,'rgba(79,142,247,.13)','rgba(79,142,247,.5)',v,'#a8c8ff');
    });
    if(t<1)listAnim=requestAnimationFrame(frame);
    else{listData=newData;listDraw(listData);setLog('list-log',`Removed ${removed}. List length: ${listData.length}.`);}
  }
  listAnim=requestAnimationFrame(frame);
}
function listReset(){if(listAnim)cancelAnimationFrame(listAnim);listData=[3,7,1,9,4];listDraw(listData);setLog('list-log','An ordered collection. Items have indices. Duplicates allowed.');}

/* ════════════════════════════════
   DYNAMIC ARRAY
════════════════════════════════ */
let dynData=[10,20,30];let dynCap=6;let dynAnim=null;
function dynDraw(hiIdx=-1){
  const minW3=Math.max(500, dynCap*(52+4)-4+80);
  const s=mkCanvas('dyn-c',170,minW3);if(!s)return;
  const{ctx,W,H}=s;ctx.clearRect(-1,-1,W+2,H+2);
  const bw=52,bh=46,sy=44,gap=4;
  const totalW=dynCap*(bw+gap)-gap;const sx=(W-totalW)/2;
  txt(ctx,W/2,18,`size: ${dynData.length}   capacity: ${dynCap}   (${Math.round(dynData.length/dynCap*100)}% full)`,11,'#454340');
  // capacity slots
  for(let i=0;i<dynCap;i++){
    const x=sx+i*(bw+gap);
    const filled=i<dynData.length,hi=i===hiIdx;
    box(ctx,x,sy,bw,bh,
      hi?'rgba(240,160,48,.22)':filled?'rgba(79,142,247,.13)':'rgba(255,255,255,.03)',
      hi?'rgba(240,160,48,.7)':filled?'rgba(79,142,247,.4)':'rgba(255,255,255,.07)',
      filled?dynData[i]:null,
      hi?'#ffc860':'#a8c8ff');
    if(!filled)txt(ctx,x+bw/2,sy+bh/2,'—',12,'#2a2a28');
    txt(ctx,x+bw/2,sy+bh+14,String(i),10,'#454340');
  }
  // fill bar
  const barY=sy+bh+32,barH=6,barW=totalW;
  rr(ctx,sx,barY,barW,barH,3);ctx.fillStyle='rgba(255,255,255,.05)';ctx.fill();
  rr(ctx,sx,barY,Math.round(barW*dynData.length/dynCap),barH,3);
  ctx.fillStyle=dynData.length/dynCap>.75?'rgba(240,96,80,.7)':'rgba(62,201,160,.7)';ctx.fill();
  txt(ctx,W/2,H-6,'capacity doubles when full',10,'#2a2a28');
}
function dynPush(){
  if(dynAnim)cancelAnimationFrame(dynAnim);
  const val=parseInt(document.getElementById('dyn-val').value)||0;
  if(dynData.length===dynCap){
    // resize animation
    const oldCap=dynCap;dynCap*=2;
    setLog('dyn-log',`Array full! Doubling capacity: ${oldCap} → ${dynCap}. Copying all items to new array…`,true);
    let start=null;
    function frame(now){
      if(!start)start=now;const t=easeOut(Math.min((now-start)/700,1));
      const rminW=Math.max(500, dynCap*(52+4)-4+80);
      const s=mkCanvas('dyn-c',170,rminW);if(!s)return;
      const{ctx,W,H}=s;ctx.clearRect(-1,-1,W+2,H+2);
      const bw=52,bh=46,gap=4;
      const totalW=dynCap*(bw+gap)-gap;const sx=(W-totalW)/2;
      txt(ctx,W/2,18,`Resizing… capacity: ${oldCap} → ${dynCap}`,11,'rgba(240,96,80,.8)');
      for(let i=0;i<dynCap;i++){
        const x=sx+i*(bw+gap);
        const filled=i<dynData.length;
        ctx.save();ctx.globalAlpha=filled?1:t*.4;
        box(ctx,x,46,bw,bh,filled?'rgba(79,142,247,.13)':'rgba(62,201,160,.08)',filled?'rgba(79,142,247,.4)':'rgba(62,201,160,.3)',filled?dynData[i]:null,'#a8c8ff');
        ctx.restore();
        txt(ctx,x+bw/2,46+bh+14,String(i),10,'#454340');
      }
      if(t<1)dynAnim=requestAnimationFrame(frame);
      else{dynData.push(val);dynDraw(dynData.length-1);setLog('dyn-log',`Resized to ${dynCap}. Added ${val} at index ${dynData.length-1}.`);}
    }
    dynAnim=requestAnimationFrame(frame);
  }else{
    dynData.push(val);dynDraw(dynData.length-1);
    setLog('dyn-log',`Pushed ${val} at index ${dynData.length-1}. ${dynCap-dynData.length} slot(s) remaining.`);
  }
}
function dynPop(){if(!dynData.length)return;const v=dynData.pop();dynDraw();setLog('dyn-log',`Popped ${v}. Size: ${dynData.length}.`);}
function dynReset(){if(dynAnim)cancelAnimationFrame(dynAnim);dynData=[10,20,30];dynCap=6;dynDraw();setLog('dyn-log','Backed by an array. Capacity doubles automatically when full.');}

/* ════════════════════════════════
   STACK — plate stack visual
════════════════════════════════ */
let stackData=[5,12,8,3];let stackAnim=null;
function stackDraw(hiTop=false){
  const ph=38,gap=6;
  const canvasH=Math.max(180, 30+stackData.length*(ph+gap)+60);
  const s=mkCanvas('stack-c',canvasH);if(!s)return;
  const{ctx,W,H}=s;ctx.clearRect(-1,-1,W+2,H+2);
  const pw=180,sx=(W-pw)/2;
  const base=H-30;
  txt(ctx,W/2,16,'Last In, First Out — like a stack of plates',11,'#454340');
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(sx-20,base);ctx.lineTo(sx+pw+20,base);ctx.stroke();
  ctx.restore();
  txt(ctx,sx+pw/2,base+14,'table surface',9,'#2a2a28');
  stackData.forEach((v,i)=>{
    const y=base-(i+1)*(ph+gap);
    const isTop=i===stackData.length-1;
    const hi=isTop&&hiTop;
    box(ctx,sx,y,pw,ph,
      hi?'rgba(240,160,48,.25)':isTop?'rgba(62,201,160,.18)':'rgba(79,142,247,.13)',
      hi?'rgba(240,160,48,.8)':isTop?'rgba(62,201,160,.6)':'rgba(79,142,247,.4)',
      v, hi?'#ffc860':isTop?'#7de8c8':'#a8c8ff', 8, isTop?1.5:.8);
    if(isTop){
      txt(ctx,sx-28,y+ph/2,'TOP',9,'#3ec9a0');
      arw(ctx,sx-10,y+ph/2,sx-2,y+ph/2,'rgba(62,201,160,.6)');
    }
  });
  if(stackData.length===0)txt(ctx,W/2,base-60,'(empty)',12,'#2a2a28');
}
function stackPush(){
  if(stackAnim)cancelAnimationFrame(stackAnim);
  const val=parseInt(document.getElementById('stack-val').value)||0;
  const ph=38,gap=6;
  const newCount=stackData.length+1;
  const canvasH=Math.max(180, 30+newCount*(ph+gap)+60);
  const s=mkCanvas('stack-c',canvasH);if(!s)return;
  const{ctx,W,H}=s;const pw=180,sx=(W-pw)/2;
  const base=H-30;
  const targetY=base-newCount*(ph+gap);
  let start=null;
  function frame(now){
    if(!start)start=now;const t=easeOut(Math.min((now-start)/450,1));
    ctx.clearRect(-1,-1,W+2,H+2);
    txt(ctx,W/2,16,'Last In, First Out — like a stack of plates',11,'#454340');
    ctx.save();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx-20,base);ctx.lineTo(sx+pw+20,base);ctx.stroke();ctx.restore();
    txt(ctx,sx+pw/2,base+14,'table surface',9,'#2a2a28');
    stackData.forEach((v,i)=>{
      const y=base-(i+1)*(ph+gap);
      box(ctx,sx,y,pw,ph,'rgba(79,142,247,.13)','rgba(79,142,247,.4)',v,'#a8c8ff');
    });
    const ghostY=lerp(targetY-80,targetY,t);
    ctx.save();ctx.globalAlpha=t;
    box(ctx,sx,ghostY,pw,ph,'rgba(62,201,160,.22)','rgba(62,201,160,.7)',val,'#7de8c8',8,1.5);
    ctx.restore();
    if(t<1)stackAnim=requestAnimationFrame(frame);
    else{stackData.push(val);stackDraw(true);setLog('stack-log',`Pushed ${val} onto the top. Stack size: ${stackData.length}.`);}
  }
  setLog('stack-log',`Pushing ${val} onto the top…`,true);
  stackAnim=requestAnimationFrame(frame);
}
function stackPop(){
  if(!stackData.length)return;
  if(stackAnim)cancelAnimationFrame(stackAnim);
  const ph=38,gap=6;
  const canvasH=Math.max(180, 30+stackData.length*(ph+gap)+60);
  const s=mkCanvas('stack-c',canvasH);if(!s)return;
  const{ctx,W,H}=s;const pw=180,sx=(W-pw)/2;
  const base=H-30;
  const topY=base-stackData.length*(ph+gap);
  let start=null;const topVal=stackData[stackData.length-1];
  function frame(now){
    if(!start)start=now;const t=easeOut(Math.min((now-start)/400,1));
    ctx.clearRect(-1,-1,W+2,H+2);
    txt(ctx,W/2,16,'Last In, First Out — like a stack of plates',11,'#454340');
    ctx.save();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx-20,base);ctx.lineTo(sx+pw+20,base);ctx.stroke();ctx.restore();
    txt(ctx,sx+pw/2,base+14,'table surface',9,'#2a2a28');
    stackData.forEach((v,i)=>{
      if(i===stackData.length-1)return;
      const y=base-(i+1)*(ph+gap);
      box(ctx,sx,y,pw,ph,'rgba(79,142,247,.13)','rgba(79,142,247,.4)',v,'#a8c8ff');
    });
    ctx.save();ctx.globalAlpha=1-t;
    box(ctx,sx,lerp(topY,topY-70,t),pw,ph,'rgba(240,96,80,.2)','rgba(240,96,80,.7)',topVal,'#ff9a90',8,1.5);
    ctx.restore();
    if(t<1)stackAnim=requestAnimationFrame(frame);
    else{stackData.pop();stackDraw();setLog('stack-log',`Popped ${topVal} off the top. Stack size: ${stackData.length}.`);}
  }
  setLog('stack-log',`Popping ${topVal} off the top…`,true);
  stackAnim=requestAnimationFrame(frame);
}
function stackReset(){if(stackAnim)cancelAnimationFrame(stackAnim);stackData=[5,12,8,3];stackDraw();setLog('stack-log','Only the TOP is accessible. Push adds, pop removes — both from the top.');}

function dictSet(){
  const k=document.getElementById('dict-key').value.trim();const v=document.getElementById('dict-val2').value.trim();
  if(!k||!v)return;
  const isNew=!(k in dictData);dictData[k]=v;dictDraw(k);
  setLog('dict-log',`${isNew?'Added new':'Updated'} key "${k}" → "${v}". Dictionary size: ${Object.keys(dictData).length}.`,true);
  setTimeout(()=>dictDraw(),500);
}
function dictGet(){
  const k=document.getElementById('dict-key').value.trim();
  if(k in dictData){dictDraw(k);setLog('dict-log',`dict["${k}"] → "${dictData[k]}". Direct O(1) lookup — no searching needed.`,true);setTimeout(()=>dictDraw(),800);}
  else setLog('dict-log',`Key "${k}" not found in dictionary.`);
}
function dictDelete(){
  const k=document.getElementById('dict-key').value.trim();
  if(!(k in dictData)){setLog('dict-log',`Key "${k}" not found.`);return;}
  delete dictData[k];dictDraw();setLog('dict-log',`Deleted key "${k}". Dictionary size: ${Object.keys(dictData).length}.`);
}
function dictReset(){dictData={name:'Casey',major:'CS',year:'2025',gpa:'3.8'};dictDraw();setLog('dict-log','Key-value pairs. Look up any value instantly via its key.');}

      <div class="method-row">
        <div class="method-sig"><span class="mn">retainAll</span>(<span class="mp">Collection c</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Keeps only elements also in c. Computes intersection.</div>
        <div class="method-badge on">O(n)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">removeAll</span>(<span class="mp">Collection c</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Removes all elements also in c. Computes difference.</div>
        <div class="method-badge on">O(n)</div>
      </div>
      </div>
    </div>`,
   init:()=>setDraw()},

  {id:'pq',label:'Priority Queue',icon:'🏥',accent:'#f07ab0',
   badge:'ordered by priority · highest served first',
   desc:'Like a hospital triage room — it\'s not first come first served. The most critical patient is always seen next, regardless of arrival order.',
   under:'Heap',
   controls:`<span class="clbl">name</span><input class="ci" id="pq-name" type="text" value="Frank" style="width:80px">
     <span class="clbl">priority (1-10)</span><input class="ci" id="pq-pri" type="number" value="7" min="1" max="10">
     <button class="cb p" onclick="pqEnqueue()">Admit</button>
     <button class="cb p" onclick="pqDequeue()">Call next</button>
     <div class="csep"></div><button class="cb" onclick="pqReset()">Reset</button>`,
   canvas:'pq-c',ch:250,log:'pq-log',logDef:'Highest priority is always seen first — regardless of arrival order.',
   callout:'<strong>Backed by a heap:</strong> the heap\'s rule (parent ≥ children) guarantees the highest-priority item is always at the root — O(1) to peek, O(log n) to insert or remove.',
   methodsHtml:`<div class="methods-panel">
      <div class="methods-header">Java methods</div>
      <div class="methods-grid">
      <div class="method-row">
        <div class="method-sig"><span class="mn">offer</span>(<span class="mp">E element</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Inserts element and re-sorts by priority. The heap bubbles it up to the right position.</div>
        <div class="method-badge on">O(log n)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">poll</span>(<span class="mp"></span>) → <span class="mr">E</span></div>
        <div class="method-desc">Removes and returns the highest priority element. Returns null if empty.</div>
        <div class="method-badge on">O(log n)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">peek</span>(<span class="mp"></span>) → <span class="mr">E</span></div>
        <div class="method-desc">Returns highest priority element without removing it. The root of the heap.</div>
        <div class="method-badge o1">O(1)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">remove</span>(<span class="mp">Object o</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Removes a specific element regardless of priority. Slower — must find it first.</div>
        <div class="method-badge on">O(n)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">contains</span>(<span class="mp">Object o</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Returns true if the element exists anywhere in the queue.</div>
        <div class="method-badge on">O(n)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">size</span>(<span class="mp"></span>) → <span class="mr">int</span></div>
        <div class="method-desc">Returns number of elements currently in the priority queue.</div>
        <div class="method-badge o1">O(1)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">isEmpty</span>(<span class="mp"></span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Returns true if no elements are waiting.</div>
        <div class="method-badge o1">O(1)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">clear</span>(<span class="mp"></span>) → <span class="mr">void</span></div>
        <div class="method-desc">Removes all elements from the priority queue.</div>
        <div class="method-badge on">O(n)</div>
      </div>
      </div>
    </div>`,
   init:()=>pqDraw()},

  {id:'dict',label:'Dictionary',icon:'🗄️',accent:'#4f8ef7',
   badge:'key → value · O(1) lookup · no duplicate keys',
   desc:'Associates keys with values, like a real dictionary where you look up a word (key) to find its definition (value). Also called a Map.',
   under:'Hash table, binary search tree',
   controls:`<span class="clbl">key</span><input class="ci" id="dict-key" type="text" value="name" style="width:80px">
     <span class="clbl">value</span><input class="ci" id="dict-val2" type="text" value="Jordan" style="width:80px">
     <button class="cb p" onclick="dictSet()">Set</button>
     <button class="cb p" onclick="dictGet()">Get</button>
     <button class="cb p" onclick="dictDelete()">Delete</button>
     <div class="csep"></div><button class="cb" onclick="dictReset()">Reset</button>`,
   canvas:'dict-c',ch:230,log:'dict-log',logDef:'Key-value pairs. Look up any value instantly via its key.',
   callout:'<strong>The key insight:</strong> a dictionary doesn\'t search through values to find one — it uses the key as a direct address (via hashing). That\'s why lookup is O(1) average.',
   methodsHtml:`<div class="methods-panel">
      <div class="methods-header">Java methods</div>
      <div class="methods-grid">
      <div class="method-row">
        <div class="method-sig"><span class="mn">put</span>(<span class="mp">K key, V value</span>) → <span class="mr">V</span></div>
        <div class="method-desc">Inserts or updates a key-value pair. Returns the previous value, or null if key was new.</div>
        <div class="method-badge o1">O(1) avg</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">get</span>(<span class="mp">Object key</span>) → <span class="mr">V</span></div>
        <div class="method-desc">Returns the value for the key, or null if the key does not exist.</div>
        <div class="method-badge o1">O(1) avg</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">remove</span>(<span class="mp">Object key</span>) → <span class="mr">V</span></div>
        <div class="method-desc">Removes and returns the value for the key. Returns null if not found.</div>
        <div class="method-badge o1">O(1) avg</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">containsKey</span>(<span class="mp">Object key</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Returns true if the key exists. Does not check values.</div>
        <div class="method-badge o1">O(1) avg</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">containsValue</span>(<span class="mp">Object value</span>) → <span class="mr">boolean</span></div>
        <div class="method-desc">Returns true if any key maps to this value. Must scan all entries.</div>
        <div class="method-badge on">O(n)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">getOrDefault</span>(<span class="mp">Object key, V default</span>) → <span class="mr">V</span></div>
        <div class="method-desc">Returns value for key, or the default if key not found. Avoids null checks.</div>
        <div class="method-badge o1">O(1) avg</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">putIfAbsent</span>(<span class="mp">K key, V value</span>) → <span class="mr">V</span></div>
        <div class="method-desc">Inserts only if the key is not already present. Useful for safe initialization.</div>
        <div class="method-badge o1">O(1) avg</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">keySet</span>(<span class="mp"></span>) → <span class="mr">Set&lt;K&gt;</span></div>
        <div class="method-desc">Returns a Set view of all keys in the map.</div>
        <div class="method-badge o1">O(1)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">values</span>(<span class="mp"></span>) → <span class="mr">Collection&lt;V&gt;</span></div>
        <div class="method-desc">Returns a Collection of all values. May contain duplicates.</div>
        <div class="method-badge o1">O(1)</div>
      </div>
      <div class="method-row">
        <div class="method-sig"><span class="mn">entrySet</span>(<span class="mp"></span>) → <span class="mr">Set&lt;Map.Entry&lt;K,V&gt;&gt;</span></div>
        <div class="method-desc">Returns all key-value pairs. The standard way to loop through the whole map.</div>
        <div class="method-badge o1">O(1)</div>
      </div>
      </div>
    </div>`,
   init:()=>dictDraw()},
];

/* ── BUILD DOM ── */
let current='list';
function switchTo(id){
  current=id;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.querySelectorAll('.panel').forEach(el=>el.classList.toggle('active',el.id==='p-'+id));
  const s=SECTIONS.find(x=>x.id===id);
  if(s)setTimeout(()=>{s.init();setLog(s.log,s.logDef);},30);
  // update accent
  document.documentElement.style.setProperty('--accent',s?.accent||'#4f8ef7');
}
const navEl=document.getElementById('nav');
const panelsEl=document.getElementById('panels');
SECTIONS.forEach(s=>{
  const ni=document.createElement('div');
  ni.className='nav-item'+(s.id===current?' active':'');
  ni.dataset.id=s.id;
  ni.innerHTML=`<span class="nav-icon">${s.icon}</span>${s.label}`;
  ni.onclick=()=>switchTo(s.id);
  navEl.appendChild(ni);

  const p=document.createElement('div');
  p.className='panel'+(s.id===current?' active':'');
  p.id='p-'+s.id;
  p.innerHTML=`
    <div class="ph">
      <div class="ph-row">
        <span style="font-size:28px">${s.icon}</span>
        <h2 class="ph-title">${s.label}</h2>
        <span class="ph-badge">${s.badge}</span>
      </div>
      <p class="ph-desc">${s.desc}</p>
      <p class="ph-under">Underlying structure: <span>${s.under}</span></p>
    </div>
    <div class="ctrls">${s.controls}</div>
    <div class="scene" id="${s.id}-scene"><canvas id="${s.canvas}"></canvas></div>
    <div class="log" id="${s.log}">${s.logDef}</div>
    <div class="callout">${s.callout}</div>
    <div id="${s.id}-methods">${s.methodsHtml||''}</div>`;
  panelsEl.appendChild(p);
});

window.addEventListener('load',()=>{
  const s=SECTIONS.find(x=>x.id===current);
  if(s){document.documentElement.style.setProperty('--accent',s.accent);s.init();setLog(s.log,s.logDef);}
});
window.addEventListener('resize',()=>{
  const s=SECTIONS.find(x=>x.id===current);if(s)s.init();
});
</script>
</body>
</html>
